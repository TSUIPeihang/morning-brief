<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>晨间财经网页简报</title>
  <style>
    body {
      margin: 0;
      background: #f6f8f7;
      color: #15201c;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.65;
    }

    main {
      width: min(900px, calc(100% - 40px));
      margin: 0 auto;
      padding: 72px 0;
    }

    .hero {
      border: 1px solid #dce4e0;
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 16px 36px rgba(15, 32, 28, 0.09);
      overflow: hidden;
    }

    img {
      width: 100%;
      aspect-ratio: 16 / 7;
      object-fit: cover;
      display: block;
    }

    .content {
      padding: 28px;
    }

    h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
    }

    p {
      color: #66736f;
    }

    a {
      display: inline-flex;
      margin-top: 12px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #0c7a53;
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <img src="assets/morning-brief-2026-05-22-hero.png" alt="晨间财经网页简报">
      <div class="content">
        <h1>晨间财经网页简报</h1>
        <p>这里会按交易日归档每日财经网页简报。当前样例为 2026-05-22。</p>
        <a href="2026-05-22/">查看 2026-05-22 报告</a>
      </div>
    </section>
  </main>
</body>
</html>
