<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbfa"/>
      <stop offset="100%" stop-color="#edf4f1"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d7a53"/>
      <stop offset="100%" stop-color="#1aa26f"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" rx="32" fill="url(#bg)"/>
  <rect x="56" y="56" width="1088" height="648" rx="28" fill="#ffffff" stroke="#d8e2dd"/>
  <text x="86" y="112" fill="#11211d" font-size="34" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">今日三条主线：地缘风险 → 利率与美元 → AI/南向/内资风格切换</text>
  <g>
    <rect x="92" y="164" width="300" height="168" rx="20" fill="#0d7a53"/>
    <text x="122" y="214" fill="#ffffff" font-size="28" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">全球变量</text>
    <text x="122" y="258" fill="#e7fff5" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">伊朗相关冲突反复</text>
    <text x="122" y="294" fill="#e7fff5" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">油价、美元、长端利率</text>
    <text x="122" y="330" fill="#e7fff5" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">决定风险偏好上限</text>
  </g>
  <g>
    <rect x="450" y="164" width="300" height="168" rx="20" fill="#112d27"/>
    <text x="480" y="214" fill="#ffffff" font-size="28" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">A股盘前</text>
    <text x="480" y="258" fill="#dff9ef" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">监管收紧跨境展业</text>
    <text x="480" y="294" fill="#dff9ef" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">券商/高股息更稳</text>
    <text x="480" y="330" fill="#dff9ef" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">成长看量能与外盘验证</text>
  </g>
  <g>
    <rect x="808" y="164" width="300" height="168" rx="20" fill="#173d34"/>
    <text x="838" y="214" fill="#ffffff" font-size="28" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">港股与美股</text>
    <text x="838" y="258" fill="#dff9ef" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">港股看芯片与南向</text>
    <text x="838" y="294" fill="#dff9ef" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">美股看AI龙头与PCE前瞻</text>
    <text x="838" y="330" fill="#dff9ef" font-size="22" font-family="Arial, PingFang SC, Microsoft YaHei">收益率回落才利多扩估值</text>
  </g>
  <path d="M392 248H446" stroke="url(#arrow)" stroke-width="8" stroke-linecap="round"/>
  <path d="M750 248H804" stroke="url(#arrow)" stroke-width="8" stroke-linecap="round"/>
  <path d="M424 248L446 232V264L424 248Z" fill="#139563"/>
  <path d="M782 248L804 232V264L782 248Z" fill="#139563"/>
  <g>
    <rect x="92" y="400" width="1016" height="248" rx="22" fill="#f4f8f6" stroke="#d8e2dd"/>
    <text x="122" y="452" fill="#15211e" font-size="30" font-weight="700" font-family="Arial, PingFang SC, Microsoft YaHei">执行顺序</text>
    <text x="122" y="500" fill="#3f534d" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei">1. 先判断油价、美元和美债是否继续共振上行。</text>
    <text x="122" y="544" fill="#3f534d" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei">2. 再看A股早盘量能是否支持券商/高股息之外的成长扩散。</text>
    <text x="122" y="588" fill="#3f534d" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei">3. 港股盯南向净流向和芯片、互联网能否接棒金融权重。</text>
    <text x="122" y="632" fill="#3f534d" font-size="24" font-family="Arial, PingFang SC, Microsoft YaHei">4. 晚间用美国 5 月 28 日的 GDP 二修与 4 月 PCE 检验高利率与 AI 叙事能否并存。</text>
  </g>
</svg>
